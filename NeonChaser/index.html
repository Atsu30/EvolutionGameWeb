<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Chaser - 3Dアクションローグライク</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/gacha.css">
    <link rel="stylesheet" href="css/effects.css">
    <!-- Three.js & PostProcessing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
</head>
<body>
    <canvas id="game-canvas"></canvas>
    <div id="speed-lines"></div>
    <div id="damage-flash"></div>

    <div id="warning-container">
        <div class="warning-text" id="w-text">急カーブ</div>
        <div class="warning-icon" id="w-icon">≫</div>
    </div>

    <!-- Achievement popup toast -->
    <div id="achieve-popup" class="achieve-popup"></div>

    <!-- XP Popup container -->
    <div id="xp-popup-container"></div>

    <!-- Stage Popup -->
    <div id="stage-popup" class="stage-popup"></div>

    <!-- Countdown -->
    <div id="countdown" class="countdown"></div>

    <div id="ui-layer">
        <button class="menu-btn" onclick="goToMenuPage()">☰</button>
        <div class="hud-container">
            <div class="hud-box">
                <div class="hud-header"><div class="hud-title">レベル</div><div class="level-text" id="ui-lv">Lv 1</div></div>
                <div class="bar-bg"><div class="bar-fill" id="exp-fill" style="background: linear-gradient(90deg, #10b981, #34d399); box-shadow: 0 0 5px #34d399;"></div></div>
            </div>
            <div class="hud-box">
                <div class="hud-header"><div class="hud-title">速度</div><div class="level-text" id="ui-spd" style="color:#60a5fa; text-shadow:0 0 5px #3b82f6;">0</div></div>
                <div class="bar-bg"><div class="bar-fill" id="speed-fill"></div></div>
            </div>
            <div class="hud-box">
                <div class="hud-header"><div class="hud-title">装甲</div><div class="level-text" id="ui-hp" style="color:#86efac; text-shadow:0 0 5px #22c55e;">100</div></div>
                <div class="bar-bg"><div class="bar-fill" id="hp-fill"></div></div>
            </div>
        </div>
        <div class="dist-display" id="ui-dist">0.00 km</div>
    </div>

    <div id="touch-controls">
        <div class="touch-zone" id="t-left"></div>
        <div class="touch-zone" id="t-right"></div>
    </div>

    <!-- Title Screen -->
    <div id="title-page" class="page-overlay active" onclick="goToMenu()">
        <div class="title-scanlines"></div>
        <div class="title-content">
            <div class="title-logo">NEON<br>CHASER</div>
            <div class="title-sub">3D ACTION ROGUELIKE</div>
            <div class="title-tap">TAP TO START</div>
        </div>
        <div class="title-ver">v1.0</div>
    </div>

    <!-- Level Up -->
    <div id="levelup-modal" class="modal-overlay">
        <div class="levelup-flash"></div>
        <div class="levelup-burst" id="levelup-burst"></div>
        <div class="modal-title">レベルアップ！</div>
        <div class="upgrade-cards" id="upgrades"></div>
    </div>

    <!-- Game Over -->
    <div id="gameover-modal" class="modal-overlay">
        <div class="modal-title" style="color:#ef4444;">システムクラッシュ</div>
        <div style="color:white; font-size:24px; margin-bottom:6px;">到達レベル: <span id="res-lv" style="font-weight:bold; color:#4ade80;">1</span></div>
        <div style="color:#facc15; font-size:22px; font-weight:900; margin-bottom:4px;"><span id="res-dist">0.00 km</span></div>
        <div style="color:#34d399; font-size:16px; margin-bottom:16px;">獲得マイル: <span id="res-miles" style="font-weight:bold;">+0</span></div>

        <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center;">
            <button class="btn" onclick="restartGame()">もう一度</button>
            <button class="btn btn-secondary" onclick="showRanking()">ランキング</button>
            <button class="btn btn-secondary" onclick="goToMenuPage()">メニュー</button>
        </div>
    </div>

    <!-- Main Menu -->
    <div id="menu-page" class="page-overlay">
        <div class="menu-page-inner">
            <div class="menu-logo-small">NEON CHASER</div>
            <button class="menu-start-btn" onclick="startGame()">
                <span class="menu-start-icon">▶</span>ゲームスタート
            </button>
            <div class="menu-grid">
                <div class="menu-card" onclick="showRanking()">
                    <div class="menu-card-icon">📊</div><div class="menu-card-label">ランキング</div>
                </div>
                <div class="menu-card" onclick="showAchievements()">
                    <div class="menu-card-icon">🏆</div><div class="menu-card-label">実績</div>
                </div>
                <div class="menu-card" onclick="showGacha()">
                    <div class="menu-card-icon">🎰</div><div class="menu-card-label">ガチャ</div>
                </div>
                <div class="menu-card" onclick="showCustomize()">
                    <div class="menu-card-icon">🔧</div><div class="menu-card-label">カスタム</div>
                </div>
                <div class="menu-card" onclick="showShop()">
                    <div class="menu-card-icon">🛒</div><div class="menu-card-label">ショップ</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Ranking -->
    <div id="ranking-modal" class="modal-overlay">
        <div class="modal-title">ランキング</div>
        <div id="ranking-list" class="modal-scroll"></div>
        <button class="btn btn-secondary" onclick="goBack()">戻る</button>
    </div>

    <!-- Achievements -->
    <div id="achieve-modal" class="modal-overlay">
        <div class="modal-title">実績</div>
        <div style="color:#64748b; margin-bottom:16px; font-size:14px;">解放済み: <span id="achieve-progress" style="color:#34d399; font-weight:bold;">0 / 8</span></div>
        <div id="achieve-list" class="modal-scroll"></div>
        <button class="btn btn-secondary" onclick="goBack()">戻る</button>
    </div>

    <!-- Gacha -->
    <div id="gacha-modal" class="modal-overlay">
        <div class="gacha-flash" id="gacha-flash"></div>
        <div class="modal-title">ガチャ</div>
        <div class="wallet-display">
            <span>マイル: <strong id="gacha-miles">0</strong></span>
            <span>スクラップ: <strong id="gacha-scrap">0</strong></span>
        </div>
        <div id="gacha-result" class="gacha-result" style="display:none;">
            <div class="gacha-rays" id="gacha-rays"></div>
            <div class="gacha-burst-container" id="gacha-burst"></div>
        </div>
        <button class="btn" id="gacha-pull-btn" onclick="doPull()">1回引く — 100マイル</button>
        <button class="btn btn-secondary" onclick="goBack()" style="margin-top:12px;">戻る</button>
    </div>

    <!-- Customize -->
    <div id="custom-modal" class="modal-overlay">
        <div class="modal-title">カスタム</div>
        <div class="preview-wrapper">
            <canvas id="preview-canvas" width="240" height="160"></canvas>
        </div>
        <div class="sub-tabs">
            <button class="sub-tab active" id="custom-tab-color" onclick="switchCustomTab('color')">カラー</button>
            <button class="sub-tab" id="custom-tab-tire" onclick="switchCustomTab('tire')">タイヤ</button>
            <button class="sub-tab" id="custom-tab-body" onclick="switchCustomTab('body')">ボディ</button>
            <button class="sub-tab" id="custom-tab-trail" onclick="switchCustomTab('trail')">トレイル</button>
        </div>
        <div id="custom-grid" class="item-grid"></div>
        <button class="btn btn-secondary" onclick="goBack()" style="margin-top:16px;">戻る</button>
    </div>

    <!-- Shop -->
    <div id="shop-modal" class="modal-overlay">
        <div class="modal-title">ショップ</div>
        <div style="color:#94a3b8; margin-bottom:16px;">スクラップ: <strong id="shop-scrap" style="color:#fbbf24;">0</strong></div>
        <div id="shop-list" class="modal-scroll"></div>
        <button class="btn btn-secondary" onclick="goBack()">戻る</button>
    </div>

    <!-- Debug: show errors on screen -->
    <div id="error-log" style="position:fixed;bottom:0;left:0;width:100%;max-height:40vh;overflow-y:auto;background:rgba(0,0,0,0.9);color:#f87171;font-family:monospace;font-size:12px;padding:8px;z-index:9999;display:none;user-select:text;-webkit-user-select:text;pointer-events:auto;"></div>
    <script>
        const _errLog = document.getElementById('error-log');
        function _showErr(msg) { _errLog.style.display = 'block'; _errLog.innerHTML += '<div>' + msg + '</div>'; }
        window.onerror = (m, s, l, c, e) => _showErr(`[ERROR] ${m} (${s}:${l}:${c})`);
        window.addEventListener('unhandledrejection', e => _showErr(`[PROMISE] ${e.reason}`));
    </script>

    <!-- Game Scripts (order matters) -->
    <script src="js/state.js"></script>
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/effects.js"></script>

    <script src="js/score.js"></script>
    <script src="js/achievements.js"></script>
    <script src="js/customization.js"></script>
    <script src="js/gacha.js"></script>
    <script src="js/stage.js"></script>
    <script src="js/entities.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/gacha-ui.js"></script>
    <script src="js/customize-ui.js"></script>
    <script src="js/controls.js"></script>
    <script src="js/gameloop.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
