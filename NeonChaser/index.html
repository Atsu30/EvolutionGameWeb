<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Chaser - 3D Action Roguelike</title>
    <style>
        /* --- ベース設定 --- */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050510; font-family: 'Segoe UI', sans-serif; user-select: none; -webkit-user-select: none; }
        #game-canvas { width: 100%; height: 100%; display: block; }

        /* --- UI レイヤー --- */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box; z-index: 10; }
        .hud-container { display: flex; justify-content: center; width: 100%; gap: 8px; }
        .hud-box { background: rgba(10, 10, 20, 0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 6px 10px; width: 120px; backdrop-filter: blur(4px); box-shadow: 0 2px 5px rgba(0,0,0,0.5); pointer-events: auto; }
        .hud-header { display: flex; justify-content: space-between; align-items: baseline; }
        .hud-title { font-size: 9px; font-weight: bold; color: #88a; text-transform: uppercase; letter-spacing: 0.5px; margin: 0; }
        .level-text { font-size: 15px; font-weight: 900; color: #fff; margin: 0; }
        
        .bar-bg { width: 100%; height: 4px; background: #1a1a2e; border-radius: 2px; overflow: hidden; border: 1px solid #334; margin-top: 5px; }
        .bar-fill { height: 100%; transition: width 0.1s linear; }

        /* --- エフェクト --- */
        #damage-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 6; }
        #speed-lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 4; opacity: 0; transition: opacity 0.3s; background: radial-gradient(circle, transparent 40%, rgba(0, 255, 255, 0.1) 100%); }

        /* --- 警告UI --- */
        #warning-container { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); text-align: center; display: none; z-index: 15; }
        #warning-container.active { display: block; animation: blink 0.3s infinite alternate; }
        @keyframes blink { 0% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0.2; transform: translate(-50%, -50%) scale(1.1); } }
        .warning-text { font-size: 36px; font-weight: 900; color: #facc15; text-shadow: 0 0 20px #ca8a04, 3px 3px 0 #000; margin-bottom: 5px; font-style: italic; }
        .warning-icon { font-size: 100px; font-weight: 900; color: #facc15; text-shadow: 0 0 30px #ca8a04, 5px 5px 0 #000; line-height: 0.8; }

        /* --- モーダル --- */
        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,5,10,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; opacity: 0; visibility: hidden; transition: opacity 0.3s ease; z-index: 100; backdrop-filter: blur(10px); }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-title { font-size: 42px; font-weight: 900; color: #fff; margin-bottom: 40px; text-transform: uppercase; text-shadow: 0 0 20px rgba(255,255,255,0.5); }
        
        .upgrade-cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; padding: 0 20px; }
        .card { background: linear-gradient(145deg, #1e1e2f, #151520); border: 2px solid #334; border-radius: 16px; padding: 30px 20px; width: 260px; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .card:hover { transform: translateY(-10px); border-color: #60a5fa; box-shadow: 0 15px 30px rgba(37,99,235,0.4); }
        .card-icon { font-size: 48px; margin-bottom: 20px; }
        .card-title { font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 12px; }
        .card-desc { font-size: 14px; color: #94a3b8; line-height: 1.5; }
        .btn { padding: 15px 40px; font-size: 20px; font-weight: bold; color: #fff; background: linear-gradient(90deg, #2563eb, #3b82f6); border: none; border-radius: 30px; cursor: pointer; transition: transform 0.2s; margin-top: 30px; letter-spacing: 2px; }
        .btn:hover { transform: scale(1.05); }

        #touch-controls { position: absolute; bottom: 0; left: 0; width: 100%; height: 60%; display: flex; z-index: 20; }
        .touch-zone { flex: 1; height: 100%; touch-action: none; }

        /* --- AI Feedback --- */
        .ai-feedback { background: rgba(16, 185, 129, 0.1); border: 1px solid #10b981; border-radius: 8px; padding: 15px; margin-bottom: 20px; max-width: 400px; text-align: center; display: none; }
        .ai-loading { color: #34d399; font-style: italic; animation: pulse 1.5s infinite; }
        .ai-title-label { font-size: 12px; color: #10b981; font-weight: bold; margin-bottom: 5px; letter-spacing: 1px;}
        .ai-title-text { font-size: 20px; color: #fff; font-weight: 900; text-shadow: 0 0 10px #10b981; margin-bottom: 10px; letter-spacing: 2px; }
        .ai-desc { font-size: 14px; color: #a7f3d0; line-height: 1.5; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* --- モバイル対応 --- */
        @media (max-width: 768px) {
            .hud-box { width: 30%; padding: 4px 8px; min-width: 80px; }
            .level-text { font-size: 13px; } .hud-title { font-size: 8px; }
            .warning-text { font-size: 24px; } .warning-icon { font-size: 70px; }
            .upgrade-cards { flex-direction: column; gap: 15px; }
            .card { width: 100%; max-width: 320px; padding: 20px; flex-direction: row; text-align: left; }
            .card-icon { margin-bottom: 0; margin-right: 20px; font-size: 36px; }
            .modal-title { font-size: 28px; margin-bottom: 20px; }
        }
    </style>
    <!-- Three.js & PostProcessing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
</head>
<body>
    <canvas id="game-canvas"></canvas>
    <div id="speed-lines"></div>
    <div id="damage-flash"></div>

    <div id="warning-container">
        <div class="warning-text" id="w-text">SHARP TURN</div>
        <div class="warning-icon" id="w-icon">≫</div>
    </div>

    <div id="ui-layer">
        <div class="hud-container">
            <div class="hud-box">
                <div class="hud-header"><div class="hud-title">Level</div><div class="level-text" id="ui-lv">Lv 1</div></div>
                <div class="bar-bg"><div class="bar-fill" id="exp-fill" style="background: linear-gradient(90deg, #10b981, #34d399); box-shadow: 0 0 5px #34d399;"></div></div>
            </div>
            <div class="hud-box">
                <div class="hud-header"><div class="hud-title">Speed</div><div class="level-text" id="ui-spd" style="color:#60a5fa; text-shadow:0 0 5px #3b82f6;">0</div></div>
                <div class="bar-bg"><div class="bar-fill" id="speed-fill"></div></div>
            </div>
            <div class="hud-box">
                <div class="hud-header"><div class="hud-title">Armor</div><div class="level-text" id="ui-hp" style="color:#86efac; text-shadow:0 0 5px #22c55e;">100</div></div>
                <div class="bar-bg"><div class="bar-fill" id="hp-fill"></div></div>
            </div>
        </div>
    </div>

    <div id="touch-controls">
        <div class="touch-zone" id="t-left"></div>
        <div class="touch-zone" id="t-right"></div>
    </div>

    <div id="levelup-modal" class="modal-overlay">
        <div class="modal-title">SYSTEM UPGRADE</div>
        <div class="upgrade-cards" id="upgrades"></div>
    </div>
    
    <div id="gameover-modal" class="modal-overlay">
        <div class="modal-title" style="color:#ef4444;">SYSTEM CRASH</div>
        <div style="color:white; font-size:24px; margin-bottom:10px;">Final Level: <span id="res-lv" style="font-weight:bold; color:#4ade80;">1</span></div>
        <div style="color:#94a3b8; margin-bottom:20px;">車体が大破しました...</div>
        
        <div id="ai-feedback" class="ai-feedback">
            <div id="ai-loading" class="ai-loading">✨ AI ANALYZING RIDING DATA...</div>
            <div id="ai-result" style="display: none;">
                <div class="ai-title-label">AI ASSIGNED TITLE</div>
                <div id="ai-title" class="ai-title-text"></div>
                <div id="ai-desc" class="ai-desc"></div>
            </div>
        </div>

        <button class="btn" onclick="restartGame()">REBOOT SYSTEM</button>
    </div>

    <script>
        // --- 設定と基本定義 ---
        const el = id => document.getElementById(id);
        const { min, max, random, floor, ceil, PI, abs, sign, pow, atan, atan2 } = Math;
        const R = () => random();
        const R_Sign = () => (R() - 0.5) * 2;

        const CFG = {
            maxSpd: 120, acc: 40, steer: 35, size: 1.0, kb: 1.0, hp: 100, guardDmg: 20, healRate: 0.15, healAmt: 20,
            dashRatio: 0.08, dashDur: 2.5, dashSpdMul: 1.6, jmpRatio: 0.05, jmpPow: 45, grav: 100,
            rocketRatio: 0.07,
            laneW: 16, maxCrv: 0.0035, crvInt: 3.5, cfForce: 0.15,
            sCrvBase: 60, sCrvRnd: 30, sCrvWarn: 2.5, sCrvDur: 3.0, sCrvFrc: 0.022, sCrvSpd: 0.01,
            spwnInt: 0.35, hitDecel: 15, wallDecel: 120, pGrav: 150, lvExp: 50, expMul: 1.5         
        };

        const ENEMY_DEFS = [
            { lv: 1, kb: 1.0, w: 1.0, dmg: 10, exp: 10 }, { lv: 2, kb: 2.0, w: 1.3, dmg: 20, exp: 20 },
            { lv: 3, kb: 3.0, w: 1.7, dmg: 30, exp: 35 }, { lv: 4, kb: 4.0, w: 2.2, dmg: 45, exp: 50 },
            { lv: 5, kb: 5.0, w: 3.0, dmg: 60, exp: 80 }
        ];
        
        const ROCKET_DEF = { lv: 3, kb: 3.0, w: 1.5, dmg: 30, exp: 40 };

        const UPGRADES = [
            { id: 'spd', i: '⚡', t: 'Engine Overclock', d: '最高速度アップ。<br>※カーブで遠心力に負けやすくなる' },
            { id: 'grp', i: '🛞', t: 'Tire Grip', d: 'ハンドリングアップ。<br>遠心力に抗い急カーブに強くなる' },
            { id: 'siz', i: '🛡️', t: 'Chassis Expansion', d: '車体が巨大化。<br>当たり判定が広がり巻き込みやすくなる' },
            { id: 'atk', i: '💥', t: 'Kinetic Amplifier', d: '攻撃力アップ。<br>より大きく硬い敵(赤色)を粉砕可能になる' }
        ];

        // --- Gemini API Setup ---
        const apiKey = ""; 
        async function fetchAIFeedback(stats) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const prompt = `あなたはサイバーパンク世界のAIナビゲーターです。プレイヤーのバイクゲームの走行データを分析し、称号と評価をJSON形式で返して。
データ: 到達Lv: ${stats.lv}, 粉砕した敵: ${stats.destroyed}, 被ダメージ回数: ${stats.damage}, ダッシュ回数: ${stats.dash}, ジャンプ回数: ${stats.jump}
要件: 
- "title": プレイスタイルを表すサイバーパンク風の二つ名（例: "音速の破壊者", "ジャンプ・マスター", "傷だらけの狂気"など）
- "feedback": プレイスタイルへの短い評価と熱いアドバイス（2文程度）
JSON形式で出力してください。`;

            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { responseMimeType: "application/json" }
            };

            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
                    if (!response.ok) throw new Error("API Error");
                    const data = await response.json();
                    return JSON.parse(data.candidates[0].content.parts[0].text);
                } catch (e) {
                    if (i === 4) return { title: "UNKNOWN RIDER", feedback: "データ解析に失敗しました。再起動を推奨します。" };
                    await new Promise(r => setTimeout(r, delays[i]));
                }
            }
        }

        // --- ステート管理 ---
        let st = {}, keys = { l: false, r: false }, ents = [], pts = [], road = [];
        let shockIdx = 0;
        const clock = new THREE.Clock();

        // --- Three.js & Renderer Init ---
        const canvas = el('game-canvas');
        const rdr = new THREE.WebGLRenderer({ canvas, antialias: true });
        rdr.setSize(window.innerWidth, window.innerHeight); 
        rdr.setPixelRatio(min(window.devicePixelRatio, 2));
        
        const scene = new THREE.Scene(); 
        scene.fog = new THREE.FogExp2(0x050510, 0.015); 
        
        const cam = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 400);
        cam.position.set(0, 8, 15); cam.lookAt(0, 0, -20); scene.add(cam);

        // --- Shader: Shockwave ---
        const ShockShader = {
            uniforms: { 
                tDiffuse: { value: null }, 
                asp: { value: window.innerWidth / window.innerHeight }, 
                c: { value: [new THREE.Vector2(-1,-1), new THREE.Vector2(-1,-1), new THREE.Vector2(-1,-1)] }, 
                t: { value: [0.0, 0.0, 0.0] }, 
                a: { value: [0, 0, 0] } 
            },
            vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragmentShader: `
                uniform sampler2D tDiffuse; uniform float asp; uniform vec2 c[3]; uniform float t[3]; uniform int a[3]; varying vec2 vUv;
                void main() { 
                    vec2 uv = vUv; vec2 off = vec2(0.0);
                    for(int i = 0; i < 3; i++) {
                        if(a[i] == 1) {
                            vec2 d = vUv - c[i]; d.x *= asp; float dist = length(d);
                            if (dist > 0.001) {
                                float wave = smoothstep(0.0, 1.0, max(0.0, 1.0 - abs(dist - t[i] * 2.5) / 0.15));
                                off += (d / dist) * wave * max(0.0, 1.0 - (t[i] / 0.6)) * 0.06 / vec2(asp, 1.0);
                            }
                        }
                    } 
                    gl_FragColor = texture2D(tDiffuse, clamp(uv - off, 0.0, 1.0)); 
                }`
        };

        const rPass = new THREE.RenderPass(scene, cam);
        const sPass = new THREE.ShaderPass(ShockShader);
        const bPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.0, 0.5, 0.1); 
        const composer = new THREE.EffectComposer(rdr); 
        composer.addPass(rPass); composer.addPass(sPass); composer.addPass(bPass);

        scene.add(new THREE.AmbientLight(0xffffff, 0.3), new THREE.HemisphereLight(0x0f172a, 0xec4899, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8); dirLight.position.set(10, 20, 10); scene.add(dirLight);

        // --- Floor Shader ---
        const floorMat = new THREE.ShaderMaterial({
            uniforms: { time: { value: 0 }, crv: { value: 0 } },
            vertexShader: `
                uniform float crv; varying vec2 vUv; varying vec3 vPos; 
                void main() { vUv = uv; vec3 p = position; p.x += crv * p.z * p.z; vPos = p; gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0); }`,
            fragmentShader: `
                uniform float time; varying vec2 vUv; varying vec3 vPos; 
                void main() {
                    vec2 uv = vUv * vec2(30.0, 120.0); uv.y -= time * 4.0; vec2 g = abs(fract(uv - 0.5) - 0.5);
                    float glow = max(smoothstep(0.06, 0.0, g.x), smoothstep(0.06, 0.0, g.y));
                    float road = smoothstep(16.5, 16.0, abs((vUv.x - 0.5) * 300.0));
                    vec3 baseCol = mix(vec3(0.0, 0.1, 0.3), vec3(0.0, 0.4, 0.8), road);
                    gl_FragColor = vec4(baseCol * glow * 0.5 * smoothstep(-350.0, -20.0, vPos.z), 1.0);
                }`,
            transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
        });
        const floorGeo = new THREE.PlaneGeometry(300, 600, 30, 100); floorGeo.rotateX(-PI/2).translate(0, 0, -200);
        scene.add(new THREE.Mesh(floorGeo, floorMat));

        // --- Materials & Geometries ---
        const MkMat = (c, e, i, r=0.3, m=0.5) => new THREE.MeshStandardMaterial({ color: c, emissive: e, emissiveIntensity: i, roughness: r, metalness: m });
        
        const matTire = MkMat(0x111111, 0, 0, 0.9, 0.1);
        const matPlayerBody = MkMat(0x38bdf8, 0x0284c7, 0.6); const matPlayerNeon = MkMat(0x00ffff, 0x00ffff, 2.0);
        
        // 倒せる敵：暗めの緑
        const matEnemyBreak = MkMat(0x064e3b, 0x022c22, 0.5); const matEnemyNeonB = MkMat(0x10b981, 0x059669, 1.0);
        // 倒せない敵（危険）：赤
        const matEnemyUnbreak = MkMat(0xbe123c, 0x9f1239, 0.8); const matEnemyNeonU = MkMat(0xff0055, 0xe11d48, 2.0);
        
        const matEnemyKnock = MkMat(0x94a3b8, 0x334155, 0.5, 0.5, 0.5); const matEnemyNeonK = MkMat(0x1e293b, 0x1e293b, 1.0);

        const applyGeo = (g, func) => { func(g); return g; };
        const geoBody = applyGeo(new THREE.ConeGeometry(0.4, 3.5, 3), g => g.rotateX(-PI/2).rotateZ(PI/2));
        const geoTire = applyGeo(new THREE.CylinderGeometry(0.55, 0.55, 0.3, 12), g => g.rotateZ(PI/2));
        const geoRim = applyGeo(new THREE.CylinderGeometry(0.45, 0.45, 0.32, 12), g => g.rotateZ(PI/2));
        
        const createBike = (bodyMat, neonMat) => {
            const grp = new THREE.Group();
            const makeTire = z => { 
                const g = new THREE.Group(), t = new THREE.Mesh(geoTire, matTire), r = new THREE.Mesh(geoRim, neonMat), e = new THREE.LineSegments(new THREE.EdgesGeometry(geoTire), neonMat); 
                g.add(t, r, e); g.position.set(0, 0.55, z); return g; 
            };
            const fTire = makeTire(-1.3), rTire = makeTire(1.3);
            const nl = new THREE.LineSegments(new THREE.EdgesGeometry(geoBody), neonMat);
            nl.position.set(0, 0.9, 0); 
            grp.add(fTire, rTire, nl);
            
            grp.userData = { 
                tires: [fTire, rTire], 
                changeMat: (b, n) => { nl.material = n; fTire.children[1].material = n; fTire.children[2].material = n; rTire.children[1].material = n; rTire.children[2].material = n; } 
            };
            return grp;
        };

        const playerMesh = createBike(matPlayerBody, matPlayerNeon); 
        playerMesh.scale.setScalar(1.5); scene.add(playerMesh); const playerBox = new THREE.Box3();
        
        // --- 新しい敵：サイバーロケット ---
        const geoRBody = applyGeo(new THREE.ConeGeometry(0.8, 3.5, 5), g => g.rotateX(-PI/2));
        const geoROrb = new THREE.SphereGeometry(0.3, 8, 8);
        const createRocket = (bodyMat, neonMat) => {
            const grp = new THREE.Group();
            const bd = new THREE.Mesh(geoRBody, bodyMat);
            const nl = new THREE.LineSegments(new THREE.EdgesGeometry(geoRBody), neonMat);
            grp.add(bd, nl);
            const orbs = new THREE.Group(); const oMats = [];
            for(let i=0; i<3; i++) {
                const orb = new THREE.Mesh(geoROrb, neonMat);
                const a = (i / 3) * PI * 2; orb.position.set(Math.cos(a)*1.2, Math.sin(a)*1.2, 0);
                orbs.add(orb); oMats.push(orb);
            }
            grp.add(orbs);
            grp.userData = { orbs: orbs, changeMat: (b, n) => { bd.material = b; nl.material = n; oMats.forEach(o => o.material = n); } };
            return grp;
        };

        // --- ロケットの予兆レーンシェーダー ---
        const geoWarn = applyGeo(new THREE.PlaneGeometry(16, 300, 1, 50), g => g.rotateX(-PI/2).translate(0, 0, -150));
        const matWarnBase = new THREE.ShaderMaterial({
            uniforms: { crv: { value: 0 }, op: { value: 0.3 } },
            vertexShader: `uniform float crv; varying vec2 vUv; void main(){vUv=uv; vec3 p=position; p.x+=crv*p.z*p.z; gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.0);}`,
            fragmentShader: `uniform float op; varying vec2 vUv; void main(){ float edge = smoothstep(0.0, 0.1, vUv.x) * smoothstep(1.0, 0.9, vUv.x); gl_FragColor = vec4(1.0, 0.0, 0.0, op * edge); }`,
            transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
        });

        // ギミックと背景
        const shapeDash = new THREE.Shape(); [[0,2],[2,-2],[1,-2],[0,0],[-1,-2],[-2,-2],[0,2]].forEach((p,i)=>i?shapeDash.lineTo(p[0],p[1]):shapeDash.moveTo(p[0],p[1]));
        const geoDash = applyGeo(new THREE.ExtrudeGeometry(shapeDash, {depth:0.2, bevelEnabled:false}), g=>g.rotateX(-PI/2).translate(0, 0.1, 0).scale(1.5, 1.5, 1.5));
        const matDash = MkMat(0x00ffff, 0x00ffff, 2.0);

        const shapeHeart = new THREE.Shape(); shapeHeart.moveTo(0, 1.5); shapeHeart.bezierCurveTo(2, 3.5, 4, 1.5, 0, -3); shapeHeart.bezierCurveTo(-4, 1.5, -2, 3.5, 0, 1.5);
        const geoHeart = applyGeo(new THREE.ExtrudeGeometry(shapeHeart, {depth:0.5, bevelEnabled:true, bevelSegments:2, steps:1, bevelSize:0.2, bevelThickness:0.2}), g=>g.translate(0,0,-0.25).scale(0.5,0.5,0.5));

        // --- Main Game Loop ---
        function animate() {
            requestAnimationFrame(animate); 
            if(st.isP || st.isG) return composer.render();
            
            const rDt = min(clock.getDelta(), 0.1); let dt = rDt;
            if(st.hStop > 0) { st.hStop -= rDt; dt = rDt * 0.05; }
            
            // Curve & Spawn Event
            if(st.sCrvSt === 'N') {
                st.sCrvCd -= dt;

                        spawnRocketWarning(); 
                        st.rocketTmr = 20 + R() * 10; 
                        st.spwnT = -0.5; 
                    } else if(R() < CFG.jmpRatio){

            } else if(st.sCrvSt === 'W') {

            }
            
            const cSpd = st.sCrvSt === 'A' || st.sCrvSt === 'R' ? CFG.sCrvSpd : (st.sCrvSt === 'W' ? 0.004 : 0.002);
            st.crv = st.crv < st.tCrv ? min(st.tCrv, st.crv + cSpd * dt) : max(st.tCrv, st.crv - cSpd * dt);

            // Player State Update

                if(st.dTimer <= 0) { st.spd = st.maxSpd; el('speed-lines').style.opacity = '0'; pts.forEach(p => p.scale.z = 1); } 
            } else st.spd = min(st.maxSpd, st.spd + CFG.acc * dt);
            
            if(st.invT > 0) { 
                st.invT -= dt; playerMesh.children.forEach(c => { if(c.material) { c.material.opacity = floor(st.invT * 15) % 2 ? 0.3 : 1.0; c.material.transparent = true; } }); 
            } else playerMesh.children.forEach(c => { if(c.material) { c.material.opacity = 1.0; c.material.transparent = false; } });
            
            cam.fov += ((isDash ? 110 : 75) - cam.fov) * 5 * dt; 
            cam.updateProjectionMatrix();

            playerMesh.userData.tires.forEach(t => t.rotation.x -= st.spd * dt * 0.2);

            // Player Movement & Physics
            let trgBank = 0; if(keys.l) trgBank += 0.8; if(keys.r) trgBank -= 0.8;

            st.pLx += (-st.pBank * st.steer * 1.5 - st.crv * CFG.cfForce * st.spd * 100 + st.bVX) * dt; st.bVX *= pow(0.01, dt);

                p.L.position.set(-CFG.laneW - 1 + cx, 1.5, p.z); p.R.position.set(CFG.laneW + 1 + cx, 1.5, p.z);

            pts.forEach(p => { 
                p.rotation.x += p.userData.rX * dt; p.rotation.y += p.userData.rY * dt; p.rotation.z += p.userData.rZ * dt; 
                p.position.z += (st.spd * 0.8 + 20) * dt; 
                if(p.position.z > 20) p.position.set(R_Sign() * 60, R() * 40 + 5, R_Sign() * 150 - 50);

            // Entities Collision & Logic
            for(let i = ents.length - 1; i >= 0; i--) {
                const e = ents[i];

                    if(e.type === 'warning') {
                        e.mesh.position.x = e.lX; e.mesh.material.uniforms.crv.value = st.crv;
                        e.mesh.material.uniforms.op.value = (Math.sin(clock.elapsedTime * 20) * 0.5 + 0.5) * 0.4;
                        e.cTmr -= dt;

                                const rm = createRocket(matEnemyUnbreak, matEnemyNeonU);
                                rm.scale.set(ROCKET_DEF.w, ROCKET_DEF.w, ROCKET_DEF.w);

                    if(e.xS !== 0) { e.lX += e.xS * dt; e.xS *= pow(0.01, dt); if(abs(e.lX) > CFG.laneW) { e.lX = sign(e.lX) * CFG.laneW; e.xS *= -0.5; } }
                    e.mesh.position.x = e.lX + st.crv * e.mesh.position.z * e.mesh.position.z;
                    
                    if(e.type === 'enemy' || e.type === 'rocket') {
                        if(e.type === 'rocket') e.mesh.userData.orbs.rotation.z += 10 * dt;
                        else e.mesh.userData.tires.forEach(t => t.rotation.x -= e.zS * dt * 0.2); 
                        
                        e.mesh.rotation.y = atan(2 * st.crv * e.mesh.position.z); 
                        e.mesh.rotation.z += (st.crv * -40 - e.mesh.rotation.z) * 10 * dt; 
                        if(e.cTmr > 0) e.cTmr -= dt;
                        
                        const canBreak = isDash || st.kb >= e.def.kb;

                        else if(!canBreak && e.mS !== 'U') { e.mesh.userData.changeMat(matEnemyUnbreak, matEnemyNeonU); e.mS = 'U'; }
                    } else if(e.type === 'heal') { e.mesh.rotation.y += 3 * dt; e.mesh.rotation.z += dt; }
                    
                    e.box.setFromObject(e.mesh);

                    // Player VS Entity
                    if(playerBox.intersectsBox(e.box)) {
                        if(e.type === 'dash') { e.state = 'B'; st.dTimer = CFG.dashDur; flashScreen('rgba(0,255,255,.4)'); shakeCamera(0.2, 0.8); st.stats.dashCount++; }
                        else if(e.type === 'heal') { e.state = 'B'; st.hp = min(st.maxHp, st.hp + CFG.healAmt); flashScreen('rgba(52,211,153,.4)'); }
                        else if(e.type === 'jmp') { if(st.pY < 0.5) { st.pVY = CFG.jmpPow * (isDash ? 1.2 : 1); flashScreen('rgba(16,185,129,.3)'); st.stats.jumpCount++; } }
                        else if(e.type === 'enemy' || e.type === 'rocket') {
                            if(isDash || st.kb >= e.def.kb) {
                                e.state = 'K'; e.mesh.userData.changeMat(matEnemyKnock, matEnemyNeonK); 
                                if(!isDash) { st.spd = max(0, st.spd - CFG.hitDecel); st.hStop = 0.05 + e.def.lv * 0.03; } else st.hStop = 0.02;
                                const dfX = e.lX - st.pLx, dx = abs(dfX) < 0.5 ? R_Sign() : dfX, m = isDash ? 2 : 1; 
                                e.v.set(dx * 15 * st.kb * m, (30 + R() * 40) * st.kb * m, -((st.spd - e.zS) * 0.8 + R() * 50) * st.kb * m);

                                if(p.z <= 1.0) { 
                                    const ui = shockIdx, uu = sPass.uniforms; 
                                    uu.c.value[ui].set((p.x + 1) / 2, (p.y + 1) / 2); uu.t.value[ui] = 0.001; uu.a.value[ui] = 1; shockIdx = (ui + 1) % 3; 
                                } 
                                flashScreen('rgba(255,255,255,.3)'); st.exp += e.def.exp; st.stats.destroyedEnemies++;
                                if(st.exp >= st.nExp) { st.isP = true; st.lv++; st.exp -= st.nExp; st.nExp = floor(st.nExp * CFG.expMul); showUpgradeUI(); el('levelup-modal').classList.add('active'); } 
                                
                                if(R() < CFG.healRate) { const hm = new THREE.Mesh(geoHeart, matHeart); hm.position.set(e.lX, 1.5, e.mesh.position.z - 30); hm.rotation.set(R()*PI,0,R()*PI); addEntity('heal', hm, e.lX, 0); }
                            } else {
                                if(st.invT <= 0) { 
                                    const dfX = st.pLx - e.lX, dx = abs(dfX) < 0.5 ? R_Sign() : dfX, pf = 30 + e.def.lv * 5; 
                                    st.bVX = sign(dx) * pf; e.xS = -sign(dx) * pf * 0.5; e.cTmr = 0.5;

                    // Enemy VS Enemy
                    if(e.type === 'enemy' || e.type === 'rocket') for(let j = i - 1; j >= 0; j--) { 
                        const o = ents[j];

                            if(e.isWall && o.isWall) continue;

                                if(!v.isWall) { v.state = 'K'; v.mesh.userData.changeMat(matEnemyKnock, matEnemyNeonK); v.v.set(sign(v.lX - a.lX || R_Sign()) * 20, 20 + R() * 20, a.zS - v.zS + 30); v.aV.set(R_Sign() * 5, R_Sign() * 5, R_Sign() * 5); } 
                            } else { 
                                const dx = e.lX - o.lX || R_Sign(); 
                                if(!e.isWall) e.xS = sign(dx) * 20; if(!o.isWall) o.xS = -sign(dx) * 20;

                        }
                    }
                } else if(e.state === 'K') {

                } else if(e.state === 'B') {

                }
            }
            updateUI();

            // Camera Shake application
            if(st.cShkT > 0) { 
                st.cShkT -= rDt; cam.position.x = st.cB_X + R_Sign() * st.cShkI; cam.position.y = st.cB_Y + R_Sign() * st.cShkI; st.cShkI *= pow(0.01, rDt); 
            } else { cam.position.x = st.cB_X; cam.position.y = st.cB_Y; }
            
            composer.render();
        }

        // --- Controls & Listeners ---
        const hKey = (k, v) => { if(k === 'ArrowLeft' || k === 'a') keys.l = v; if(k === 'ArrowRight' || k === 'd') keys.r = v; };
        window.onkeydown = e => hKey(e.key, true); window.onkeyup = e => hKey(e.key, false);
        
        const addTouch = (id, k) => { 
            const e = el(id); if(!e) return;
            e.addEventListener('pointerdown', ev => { ev.preventDefault(); keys[k] = true; });
            e.addEventListener('pointerup', ev => { ev.preventDefault(); keys[k] = false; });
            e.addEventListener('pointercancel', () => keys[k] = false);
        };
        addTouch('t-left', 'l'); addTouch('t-right', 'r');
        
        window.onresize = () => { 
            cam.aspect = window.innerWidth / window.innerHeight; cam.updateProjectionMatrix(); 
            rdr.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight); 
            sPass.uniforms.asp.value = cam.aspect; 
        };
        
        window.onload = () => { restartGame(); clock.start(); animate(); };
    </script>
</body>
</html>
